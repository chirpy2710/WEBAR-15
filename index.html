<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>MindAR Image Tracking - Fixed Scale</title>

  <!-- A-Frame CDN -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <!-- MindAR CDN -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
    }
  </style>
</head>

<body>

<a-scene
  mindar-image="imageTargetSrc: new.mind;"
  vr-mode-ui="false"
  device-orientation-permission-ui="false"
  renderer="colorManagement: true; physicallyCorrectLights: true"
>

  <!-- LIGHTS (important to see model clearly) -->
  <a-entity light="type: ambient; intensity: 1"></a-entity>
  <a-entity light="type: directional; intensity: 1" position="0 1 1"></a-entity>

  <!-- Assets -->
  <a-assets>
    <a-asset-item id="model1" src="model.glb"></a-asset-item>
    <a-asset-item id="model2" src="Nike.glb"></a-asset-item>
  </a-assets>

  <!-- Camera -->
  <a-camera position="0 0 0" look-controls="false"></a-camera>

  <!-- Target 1 -->
  <a-entity mindar-image-target="targetIndex: 0">
    <a-entity
      id="m1"
      gltf-model="#model1"
      rotation="90 0 0"
      scale="1 1 1"
      pinch-scale>
    </a-entity>
  </a-entity>

  <!-- Target 2 -->
  <a-entity mindar-image-target="targetIndex: 1">
    <a-entity
      id="m2"
      gltf-model="#model2"
      rotation="90 0 0"
      scale="2 2 2"
      pinch-scale>
    </a-entity>
  </a-entity>

</a-scene>

<script>
AFRAME.registerComponent("pinch-scale", {
  init: function () {
    this.initialScale = this.el.object3D.scale.clone();
    this.startDistance = null;
    this.currentScale = this.initialScale.x;

    const sceneEl = this.el.sceneEl;

    sceneEl.addEventListener("touchstart", (e) => {
      if (e.touches.length === 2) {
        this.startDistance = this.getDistance(e.touches);
      }
    });

    sceneEl.addEventListener("touchmove", (e) => {
      if (e.touches.length === 2 && this.startDistance) {
        const newDistance = this.getDistance(e.touches);
        let scaleFactor = newDistance / this.startDistance;

        let newScale = this.currentScale * scaleFactor;

        // LIMIT SCALE RANGE (important)
        newScale = Math.max(0.3, Math.min(newScale, 8));

        this.el.object3D.scale.set(newScale, newScale, newScale);
      }
    });

    sceneEl.addEventListener("touchend", () => {
      this.currentScale = this.el.object3D.scale.x;
      this.startDistance = null;
    });
  },

  getDistance: function (touches) {
    const dx = touches[0].pageX - touches[1].pageX;
    const dy = touches[0].pageY - touches[1].pageY;
    return Math.sqrt(dx * dx + dy * dy);
  }
});
</script>

</body>
</html>
