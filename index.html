<html>
	<Title>GLB Model</Title>
  <head>
    <!-- Updated A-Frame -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="./components.js"></script>

    <style>
      #overlay {
        position: fixed;
        top: 100px;
        padding: 10px;
        z-index: 1001;
        background: rgba(0,0,0,0.6);
        color: white;
        border-radius: 6px;
      }
    </style>
  </head>

  <body>
    <a-scene 
      webxr="requiredFeatures:hit-test; optionalFeatures:dom-overlay; referenceSpaceType:local; overlayElement:#overlay" 
      background="transparent: true">

      <!-- Load GLB -->
      <a-assets>
        <a-asset-item id="nikeModel" src="Nike.glb"></a-asset-item>
      </a-assets>

      <!-- Lighting -->
      <a-light type="ambient" intensity="1"></a-light>
      <a-light type="directional" position="0 2 1" intensity="0.8"></a-light>

      <!-- GLB Model (Hidden Initially) -->
      <a-entity 
        id="nike"
        gltf-model="#nikeModel"
        scale="0.2 0.2 0.2"
        visible="false">
      </a-entity>

      <!-- Reticle -->
      <a-entity 
        ar-reticle
        geometry="primitive: ring; radiusInner: 0.15; radiusOuter: 0.2"
        material="color: green"
        rotation="-90 0 0"
        visible="false">
      </a-entity>

    </a-scene>

    <div id="overlay">
      Move phone to detect surface<br>
      Tap to place Nike model
    </div>
  </body>
</html>
