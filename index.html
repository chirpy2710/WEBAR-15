<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>WebXR AR GLB Placement</title>

  <!-- Latest A-Frame -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }
    #overlay {
      position: fixed;
      top: 20px;
      left: 20px;
      padding: 10px 15px;
      background: rgba(0,0,0,0.6);
      color: white;
      border-radius: 8px;
      z-index: 1001;
      font-family: sans-serif;
    }
  </style>
</head>

<body>

<div id="overlay">
  Move phone to detect surface<br>
  Tap screen to place model
</div>

<a-scene
  renderer="colorManagement: true;"
  webxr="requiredFeatures: hit-test; optionalFeatures: dom-overlay; referenceSpaceType: local; overlayElement: #overlay"
  background="transparent: true">

  <!-- Load GLB -->
  <a-assets>
    <a-asset-item id="model" src="model.glb"></a-asset-item>
  </a-assets>

  <!-- Lighting -->
  <a-light type="ambient" intensity="1"></a-light>
  <a-light type="directional" position="0 2 1" intensity="0.8"></a-light>

  <!-- GLB Model (Hidden Initially) -->
  <a-entity
    id="modelEntity"
    gltf-model="#model"
    scale="0.2 0.2 0.2"
    visible="false">
  </a-entity>

  <!-- Reticle -->
  <a-entity
    id="reticle"
    geometry="primitive: ring; radiusInner: 0.12; radiusOuter: 0.15"
    material="color: green"
    rotation="-90 0 0"
    visible="false">
  </a-entity>

</a-scene>

<script>
AFRAME.registerComponent('ar-hit-test', {
  init: function () {
    this.xrHitTestSource = null;
    this.viewerSpace = null;
    this.refSpace = null;

    const sceneEl = this.el.sceneEl;
    const reticle = document.getElementById('reticle');
    const model = document.getElementById('modelEntity');

    sceneEl.renderer.xr.addEventListener('sessionstart', async () => {
      const session = sceneEl.renderer.xr.getSession();

      // When user taps screen
      session.addEventListener('select', () => {
        if (!reticle.getAttribute('visible')) return;

        const pos = reticle.object3D.position;

        model.setAttribute('position', {
          x: pos.x,
          y: pos.y,
          z: pos.z
        });

        model.setAttribute('visible', true);
      });

      // Create hit test source
      this.viewerSpace = await session.requestReferenceSpace('viewer');
      this.xrHitTestSource = await session.requestHitTestSource({
        space: this.viewerSpace
      });

      this.refSpace = await session.requestReferenceSpace('local');
    });

    sceneEl.renderer.xr.addEventListener('sessionend', () => {
      this.viewerSpace = null;
      this.refSpace = null;
      this.xrHitTestSource = null;
    });
  },

  tick: function () {
    const sceneEl = this.el.sceneEl;
    const reticle = document.getElementById('reticle');

    if (!sceneEl.is('ar-mode')) return;
    if (!this.xrHitTestSource || !this.refSpace) return;

    const frame = sceneEl.frame;
    const hitTestResults = frame.getHitTestResults(this.xrHitTestSource);

    if (hitTestResults.length > 0) {
      const pose = hitTestResults[0].getPose(this.refSpace);

      const matrix = new THREE.Matrix4();
      matrix.fromArray(pose.transform.matrix);

      const position = new THREE.Vector3();
      position.setFromMatrixPosition(matrix);

      reticle.setAttribute('position', position);
      reticle.setAttribute('visible', true);
    } else {
      reticle.setAttribute('visible', false);
    }
  }
});

// Attach component to scene
document.querySelector('a-scene').setAttribute('ar-hit-test', '');
</script>

</body>
</html>
