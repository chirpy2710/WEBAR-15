<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Simple WebXR Plane AR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <!-- WebXR -->
  <script src="https://cdn.jsdelivr.net/npm/aframe@1.4.2/dist/aframe-master.min.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }
  </style>
</head>

<body>

<a-scene
  webxr="requiredFeatures: hit-test, local-floor;"
  renderer="colorManagement: true;"
  vr-mode-ui="enabled: false"
  embedded>

  <a-camera></a-camera>

  <!-- Tap to place object -->
  <a-entity id="reticle"
            geometry="primitive: ring; radiusInner: 0.05; radiusOuter: 0.06;"
            material="color: green"
            visible="false">
  </a-entity>

  <a-box id="box"
         color="blue"
         depth="0.3"
         height="0.3"
         width="0.3"
         visible="false">
  </a-box>

</a-scene>

<script>
AFRAME.registerComponent('ar-hit-test', {
  init: function () {
    const scene = this.el.sceneEl;
    const reticle = document.querySelector('#reticle');
    const box = document.querySelector('#box');

    scene.addEventListener('enter-vr', async () => {
      if (scene.is('ar-mode')) {
        const session = scene.renderer.xr.getSession();
        const viewerSpace = await session.requestReferenceSpace('viewer');
        const refSpace = await session.requestReferenceSpace('local-floor');
        const hitTestSource = await session.requestHitTestSource({ space: viewerSpace });

        scene.renderer.xr.addEventListener('frame', (event) => {
          const frame = event.frame;
          const hitTestResults = frame.getHitTestResults(hitTestSource);

          if (hitTestResults.length > 0) {
            const hit = hitTestResults[0];
            const pose = hit.getPose(refSpace);
            reticle.visible = true;
            reticle.object3D.position.set(
              pose.transform.position.x,
              pose.transform.position.y,
              pose.transform.position.z
            );
          }
        });

        scene.canvas.addEventListener('click', () => {
          if (reticle.visible) {
            box.visible = true;
            box.object3D.position.copy(reticle.object3D.position);
          }
        });
      }
    });
  }
});

document.querySelector('a-scene').setAttribute('ar-hit-test', '');
</script>

</body>
</html>
