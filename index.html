<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>WebXR Plane Detection + GLB</title>

<!-- A-Frame CDN -->
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<style>
body { margin:0; overflow:hidden; }
#startAR {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  padding: 14px 25px;
  font-size: 18px;
  border: none;
  border-radius: 8px;
  background: #2196F3;
  color: white;
  z-index: 999;
}
</style>
</head>

<body>

<button id="startAR">Start AR</button>

<a-scene
  vr-mode-ui="enabled: false"
  renderer="logarithmicDepthBuffer: true;"
  webxr="requiredFeatures: hit-test; optionalFeatures: dom-overlay; overlayElement: body"
>

  <!-- Lights -->
  <a-entity light="type: ambient; intensity: 1"></a-entity>
  <a-entity light="type: directional; intensity: 1" position="1 2 1"></a-entity>

  <!-- Camera -->
  <a-camera position="0 1.6 0"></a-camera>

  <!-- Reticle -->
  <a-entity id="reticle"
            geometry="primitive: ring; radiusInner: 0.05; radiusOuter: 0.07"
            material="color: green; shader: flat"
            rotation="-90 0 0"
            visible="false">
  </a-entity>

  <!-- GLB Model -->
  <a-entity id="model"
            gltf-model="Nike.glb"
            visible="false"
            scale="0.5 0.5 0.5">
  </a-entity>

</a-scene>

<script>
const scene = document.querySelector("a-scene");
const startButton = document.getElementById("startAR");
const reticle = document.getElementById("reticle");
const model = document.getElementById("model");

let xrSession = null;
let hitTestSource = null;
let refSpace = null;
let viewerSpace = null;

startButton.onclick = async () => {

  if (!navigator.xr) {
    alert("WebXR not supported");
    return;
  }

  xrSession = await navigator.xr.requestSession("immersive-ar", {
    requiredFeatures: ["hit-test"]
  });

  scene.renderer.xr.setSession(xrSession);

  viewerSpace = await xrSession.requestReferenceSpace("viewer");
  hitTestSource = await xrSession.requestHitTestSource({ space: viewerSpace });
  refSpace = await xrSession.requestReferenceSpace("local");

  xrSession.requestAnimationFrame(onXRFrame);

  startButton.style.display = "none";
};

function onXRFrame(t, frame) {

  xrSession.requestAnimationFrame(onXRFrame);

  const hitTestResults = frame.getHitTestResults(hitTestSource);

  if (hitTestResults.length > 0) {
    const pose = hitTestResults[0].getPose(refSpace);

    reticle.setAttribute("visible", true);
    reticle.setAttribute("position", {
      x: pose.transform.position.x,
      y: pose.transform.position.y,
      z: pose.transform.position.z
    });
  }
}

scene.addEventListener("click", () => {
  if (!reticle.getAttribute("visible")) return;

  model.setAttribute("position", reticle.getAttribute("position"));
  model.setAttribute("visible", true);
});


// ---------- PINCH SCALE ----------
let startDistance = null;
let currentScale = 0.5;

document.addEventListener("touchstart", (e) => {
  if (e.touches.length === 2) {
    startDistance = getDistance(e.touches);
  }
});

document.addEventListener("touchmove", (e) => {
  if (e.touches.length === 2 && startDistance) {
    const newDistance = getDistance(e.touches);
    let scaleFactor = newDistance / startDistance;

    let newScale = currentScale * scaleFactor;
    newScale = Math.max(0.2, Math.min(newScale, 5));

    model.setAttribute("scale", `${newScale} ${newScale} ${newScale}`);
  }
});

document.addEventListener("touchend", () => {
  currentScale = model.object3D.scale.x;
  startDistance = null;
});

function getDistance(touches) {
  const dx = touches[0].pageX - touches[1].pageX;
  const dy = touches[0].pageY - touches[1].pageY;
  return Math.sqrt(dx*dx + dy*dy);
}
</script>

</body>
</html>
