<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>WebXR GLB Placement</title>

  <!-- Latest A-Frame -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <script>
    AFRAME.registerComponent('ar-hit-test', {
      init: function () {
        this.hitTestSource = null;
        this.viewerSpace = null;
        this.refSpace = null;
        this.modelPlaced = false;

        const scene = this.el.sceneEl;

        scene.renderer.xr.addEventListener('sessionstart', async () => {
          const session = scene.renderer.xr.getSession();

          this.viewerSpace = await session.requestReferenceSpace('viewer');
          this.refSpace = await session.requestReferenceSpace('local');

          this.hitTestSource = await session.requestHitTestSource({
            space: this.viewerSpace
          });

          session.addEventListener('select', () => {
            if (!this.currentPosition || this.modelPlaced) return;

            const model = document.getElementById("model");
            model.setAttribute("position", this.currentPosition);
            model.setAttribute("visible", true);
            this.modelPlaced = true;
          });
        });
      },

      tick: function () {
        const scene = this.el.sceneEl;
        if (!scene.is('ar-mode')) return;
        if (!this.hitTestSource) return;

        const frame = scene.frame;
        const hitTestResults = frame.getHitTestResults(this.hitTestSource);

        if (hitTestResults.length > 0) {
          const pose = hitTestResults[0].getPose(this.refSpace);
          const matrix = new THREE.Matrix4().fromArray(pose.transform.matrix);

          const position = new THREE.Vector3();
          position.setFromMatrixPosition(matrix);

          this.currentPosition = position;
        }
      }
    });
  </script>

  <style>
    body { margin:0; overflow:hidden; }
  </style>
</head>

<body>

<a-scene
  xr-mode-ui="enabled: true"
  webxr="requiredFeatures: hit-test, local-floor"
  renderer="colorManagement: true;"
  background="transparent: true"
  ar-hit-test>

  <a-assets>
    <a-asset-item id="myModel" src="model.glb"></a-asset-item>
  </a-assets>

  <a-entity camera></a-entity>

  <!-- Hidden model -->
  <a-entity
    id="model"
    gltf-model="#myModel"
    scale="0.2 0.2 0.2"
    visible="false">
  </a-entity>

</a-scene>

</body>
</html>
