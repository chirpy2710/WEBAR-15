<html>
  <head>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="./components.js"></script>

    <style>
      #overlay {
	position: fixed;
	top: 100px;
	padding: 10px;
	z-index: 1001;
      }
    </style>
  </head>
  <body>
    <a-scene webxr="requiredFeatures:hit-test; optionalFeatures:dom-overlay; referenceSpaceType:local; overlayElement:#overlay" background="transparent: true"> 
      <a-assets>
  <a-asset-item id="nikeModel" src="Nike.glb"></a-asset-item>
</a-assets>

<a-entity id="box"
          gltf-model="#nikeModel"
          scale="0.2 0.2 0.2"
          visible="false">
</a-entity>
      <a-entity ar-reticle geometry="primitive: ring; radiusInner: 0.15; radiusOuter: 0.2" rotation="-90 0 0" visible="false"></a-entity>
    </a-scene>

    <div id="overlay">
      Overlay
    </div>
  </body>
</html>
