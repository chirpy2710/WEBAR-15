<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>WebXR GLB Placement</title>

  <!-- Use 1.5.0 -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="./components.js"></script>

  <style>
    #overlay {
      position: fixed;
      top: 100px;
      left: 20px;
      padding: 10px;
      z-index: 1001;
      background: rgba(0,0,0,0.6);
      color: white;
      border-radius: 6px;
      font-family: sans-serif;
    }
  </style>
</head>

<body>

<a-scene
  renderer="colorManagement: true;"
  webxr="requiredFeatures: hit-test; optionalFeatures: dom-overlay; referenceSpaceType: local; overlayElement:#overlay"
  background="transparent: true">

  <!-- Load GLB -->
  <a-assets>
    <a-asset-item id="nikeModel" src="Nike.glb"></a-asset-item>
  </a-assets>

  <!-- GLB Model (Keep id=box because JS uses it) -->
  <a-entity id="box"
            gltf-model="#nikeModel"
            scale="0.05 0.05 0.05"
            visible="false">
  </a-entity>

  <!-- Reticle -->
  <a-entity ar-reticle
            geometry="primitive: ring; radiusInner: 0.15; radiusOuter: 0.2"
            material="color: green"
            rotation="-90 0 0"
            visible="false">
  </a-entity>

</a-scene>

<div id="overlay">
  Move phone to detect surface<br>
  Tap to place Nike model
</div>

</body>
</html>
