<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>WebXR AR GLB Placement</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
  body { margin: 0; overflow: hidden; }
</style>
</head>

<body>

<script type="module">

import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
import { ARButton } from 'https://unpkg.com/three@0.160.0/examples/jsm/webxr/ARButton.js';
import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

let camera, scene, renderer;
let controller;
let model;

init();

function init() {

    scene = new THREE.Scene();

    camera = new THREE.PerspectiveCamera(
        70,
        window.innerWidth / window.innerHeight,
        0.01,
        20
    );

    const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 3);
    light.position.set(0.5, 1, 0.25);
    scene.add(light);

    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.xr.enabled = true;
    renderer.setAnimationLoop(animate);
    document.body.appendChild(renderer.domElement);

    // AR Button with required features
    document.body.appendChild(
        ARButton.createButton(renderer, {
            requiredFeatures: ['hit-test']
        })
    );

    // Load GLB model
    const loader = new GLTFLoader();
    loader.load(
        'model.glb',
        function (gltf) {
            model = gltf.scene;
            model.scale.set(0.5, 0.5, 0.5); // Adjust size if needed
        },
        undefined,
        function (error) {
            console.error("Error loading model:", error);
        }
    );

    // Controller for tap placement
    controller = renderer.xr.getController(0);
    controller.addEventListener('select', onSelect);
    scene.add(controller);

    window.addEventListener('resize', onWindowResize);
}

function onSelect() {

    if (!model) return;

    const clone = model.clone(true);

    // Place 0.5 meters in front of camera
    clone.position.set(0, 0, -0.5).applyMatrix4(controller.matrixWorld);
    clone.quaternion.setFromRotationMatrix(controller.matrixWorld);

    scene.add(clone);
}

function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate() {
    renderer.render(scene, camera);
}

</script>

</body>
</html>
